name: syncspace
description: A shared calendar app for couples to sync schedules and plan events together.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Firebase / Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.14.0

  # Google Calendar
  googleapis: ^11.4.0
  googleapis_auth: ^1.5.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.4
  flutter_local_notifications: ^16.3.0

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
